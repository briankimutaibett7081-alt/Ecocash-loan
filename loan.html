<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Details - EcoCash</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f5f5;
        }

        .header {
            background: #006b3a;
            color: white;
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .progress-steps {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
        }

        .step-item {
            text-align: center;
            flex: 1;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.7);
            position: relative;
        }

        .step-item.active {
            color: white;
            font-weight: bold;
        }

        .step-number {
            display: block;
            margin-bottom: 0.25rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: #333;
        }

        .info-box {
            background: #f0f9f0;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .info-label {
            color: #666;
        }

        .info-value {
            font-weight: bold;
            color: #006b3a;
        }

        .section-title {
            font-weight: bold;
            margin: 1rem 0 0.5rem;
            color: #333;
        }

        .loan-types {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin: 0.5rem 0 1rem;
        }

        .type-option {
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .type-option.selected {
            border-color: #006b3a;
            background: #f0f9f0;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: inherit;
            margin: 0.5rem 0;
            resize: vertical;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .back-btn {
            flex: 1;
            background: #e0e0e0;
            color: #333;
            border: none;
            padding: 0.8rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .continue-btn {
            flex: 1;
            background: #006b3a;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>EcoCash</h1>
        <div class="progress-steps">
            <div class="step-item">1<br>Loan</div>
            <div class="step-item active">2<br>Details</div>
            <div class="step-item">3<br>Personal</div>
            <div class="step-item">4<br>Address</div>
            <div class="step-item">5<br>Work</div>
            <div class="step-item">6<br>Review</div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2>Loan Details</h2>
            <p style="color:#666; margin-bottom:1rem; font-size:0.9rem;">Tell us more about your loan needs</p>
            
            <div class="info-box">
                <div class="info-row">
                    <span class="info-label">Loan Amount:</span>
                    <span class="info-value" id="displayAmount">$200</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Loan Term:</span>
                    <span class="info-value" id="displayTerm">12 months</span>
                </div>
            </div>
            
            <div class="section-title">Loan Type</div>
            <div class="loan-types">
                <div class="type-option" onclick="selectType('Personal Loan')">📱 Personal Loan</div>
                <div class="type-option" onclick="selectType('Business Loan')">💼 Business Loan</div>
                <div class="type-option" onclick="selectType('Education Loan')">📚 Education Loan</div>
                <div class="type-option" onclick="selectType('Emergency Loan')">🚨 Emergency Loan</div>
            </div>
            
            <div class="section-title">Loan Purpose</div>
            <textarea id="purpose" rows="3" placeholder="Describe why you need this loan . . ."></textarea>
            
            <div class="button-group">
                <button class="back-btn" onclick="goBack()">Back</button>
                <button class="continue-btn" onclick="goToPersonal()">Continue</button>
            </div>
        </div>
    </div>

    <script>
        let selectedType = '';
        
        window.onload = () => {
            document.getElementById('displayAmount').innerText = '$' + (localStorage.getItem('loanAmount') || '200');
            document.getElementById('displayTerm').innerText = (localStorage.getItem('loanTerm') || '12') + ' months';
        };
        
        function selectType(type) {
            selectedType = type;
            document.querySelectorAll('.type-option').forEach(opt => {
                opt.classList.remove('selected');
                if(opt.innerText.includes(type)) {
                    opt.classList.add('selected');
                }
            });
        }
        
        function goToPersonal() {
            if (!selectedType) {
                alert('Please select a loan type');
                return;
            }
            localStorage.setItem('loanType', selectedType);
            localStorage.setItem('loanPurpose', document.getElementById('purpose').value);
            window.location.href = 'personal-info.html';
        }
        
        function goBack() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
